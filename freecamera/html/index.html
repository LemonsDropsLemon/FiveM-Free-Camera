<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: transparent !important;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    user-select: none;
    font-family: 'Inter', sans-serif;
  }

  #hud {
    position: fixed;
    top: var(--hud-top, 12vh);
    left: var(--hud-left, 1.4vw);
    width: 320px;
    opacity: 0;
    transform: translateX(-12px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }

  #hud.visible {
    opacity: 1;
    transform: translateX(0);
  }

  #panel {
    background: rgba(36, 38, 42, 0.75);
    border: 1px solid rgba(255,255,255,0.11);
    border-radius: 14px;
    overflow: hidden;
  }

  /* ── Header ── */
  #header {
    padding: 15px 18px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    gap: 11px;
  }

  .hdr-icon {
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.65;
    flex-shrink: 0;
  }
  .hdr-icon svg { width: 100%; height: 100%; }

  #hdr-title {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.92);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ── Section labels ── */
  .section-label {
    padding: 11px 18px 7px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.28);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  /* ── Row ── */
  .row {
    display: flex;
    align-items: center;
    gap: 13px;
    padding: 13px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .row:last-child { border-bottom: none; }

  .row-icon {
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.38;
    flex-shrink: 0;
  }
  .row-icon svg { width: 100%; height: 100%; }

  .row-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }

  .row-sublabel {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.30);
    line-height: 1;
  }

  .row-label {
    font-size: 14px;
    font-weight: 400;
    color: rgba(255,255,255,0.84);
    line-height: 1.3;
    white-space: nowrap;
    overflow: visible;
  }

  /* Right side */
  .row-right {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
  }

  /* Key badges */
  .kb {
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.40);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.13);
    border-radius: 6px;
    padding: 3px 9px;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }

  .kb-sm {
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.38);
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.11);
    border-radius: 5px;
    padding: 3px 7px;
  }

  /* Toggle box */
  .toggle-box {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 1.5px solid rgba(255,255,255,0.20);
    background: rgba(255,255,255,0.04);
    transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .toggle-box.on {
    background: rgba(72, 199, 95, 0.88);
    border-color: rgba(72, 199, 95, 0.95);
    box-shadow: 0 0 10px rgba(72, 199, 95, 0.38);
  }

  .toggle-box.on::after {
    content: '';
    display: block;
    width: 5px;
    height: 9px;
    border-right: 2px solid rgba(0,0,0,0.65);
    border-bottom: 2px solid rgba(0,0,0,0.65);
    transform: rotate(45deg) translate(-1px, -1px);
  }

  /* ── FOV ── */
  #fov-row {
    display: flex;
    align-items: center;
    gap: 13px;
    padding: 13px 18px 16px;
  }

  #fov-icon {
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.38;
    flex-shrink: 0;
  }
  #fov-icon svg { width: 100%; height: 100%; }

  #fov-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #fov-track {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.10);
    border-radius: 3px;
    position: relative;
  }

  #fov-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: rgba(255,255,255,0.52);
    border-radius: 3px;
    transition: width 0.08s linear;
  }

  #fov-dot {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 6px rgba(255,255,255,0.55);
    transition: left 0.08s linear;
  }

  #fov-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #fov-range {
    font-size: 11px;
    color: rgba(255,255,255,0.28);
    letter-spacing: 0.05em;
  }

  #fov-num {
    font-size: 15px;
    font-weight: 500;
    color: rgba(255,255,255,0.78);
    letter-spacing: 0.03em;
    min-width: 42px;
    text-align: right;
    transition: color 0.1s;
  }

  /* Vehicle-only rows: hidden when on foot */
  .vehicle-section {
    overflow: hidden;
    max-height: 200px;
    transition: max-height 0.25s ease, opacity 0.25s ease;
    opacity: 1;
  }
  .vehicle-section.hidden {
    max-height: 0;
    opacity: 0;
  }

  /* Hide AI drive row for passengers */
  .passenger-hide {
    overflow: hidden;
    max-height: 200px;
    transition: max-height 0.25s ease, opacity 0.25s ease;
    opacity: 1;
  }
  .passenger-hide.hidden {
    max-height: 0;
    opacity: 0;
  }

  /* filter flash */
  #filter-label { transition: opacity 0.1s; }
  #filter-label.flash { opacity: 0; }
</style>
</head>
<body>

<div id="hud">
  <div id="panel">

    <div id="header">
      <div class="hdr-icon">
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="2" y="6" width="15" height="13" rx="2.5" stroke="white" stroke-width="1.6"/>
          <path d="M17 10l5-2.5v9L17 14V10z" stroke="white" stroke-width="1.6" stroke-linejoin="round"/>
          <circle cx="9.5" cy="12.5" r="3" stroke="white" stroke-width="1.4"/>
        </svg>
      </div>
      <span id="hdr-title">Freecam</span>
    </div>

    <div class="section-label">Controls</div>

    <div class="row">
      <div class="row-icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg>
      </div>
      <div class="row-body">
        <div class="row-label">Movement</div>
      </div>
      <div class="row-right">
        <span class="kb-sm">W</span><span class="kb-sm">A</span><span class="kb-sm">S</span><span class="kb-sm">D</span><span class="kb-sm">Q</span><span class="kb-sm">E</span>
      </div>
    </div>

    <div class="row">
      <div class="row-icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M7 12H17M4 8l-3 4 3 4M20 8l3 4-3 4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="row-body">
        <div class="row-label">Roll Camera</div>
      </div>
      <div class="row-right">
        <span class="kb">← →</span>
      </div>
    </div>

    <div class="row">
      <div class="row-icon">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3.5" stroke="white" stroke-width="1.6"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="white" stroke-width="1.6" stroke-linecap="round"/></svg>
      </div>
      <div class="row-body">
        <div class="row-label">Zoom</div>
      </div>
      <div class="row-right">
        <span class="kb">Scroll</span>
      </div>
    </div>

    <div class="section-label">Toggles</div>

    <div class="row">
      <div class="row-icon">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="white" stroke-width="1.6"/><path d="M8 11l4 4 4-4" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="row-body">
        <div class="row-sublabel">Camera Filters</div>
        <div class="row-label" id="filter-label">None</div>
      </div>
      <div class="row-right">
        <span class="kb">F1</span>
      </div>
    </div>

    <div class="row">
      <div class="row-icon">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2.5" stroke="white" stroke-width="1.6"/><path d="M12 8v8M8 12h8" stroke="white" stroke-width="1.6" stroke-linecap="round"/></svg>
      </div>
      <div class="row-body">
        <div class="row-label">Toggle HUD</div>
      </div>
      <div class="row-right">
        <span class="kb">F2</span>
      </div>
    </div>

    <div class="vehicle-section hidden" id="vehicle-section">
    <div class="passenger-hide" id="ai-drive-section">
    <div class="row">
      <div class="row-icon">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="white" stroke-width="1.6"/><path d="M12 7v5l3 3" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="row-body">
        <div class="row-label">AI Drive</div>
      </div>
      <div class="row-right">
        <span class="kb">F3</span>
        <div class="toggle-box" id="ai-box"></div>
      </div>
    </div>
    </div>

    <div class="row">
      <div class="row-icon">
        <svg viewBox="0 0 24 24" fill="none"><rect x="7" y="11" width="10" height="9" rx="2" stroke="white" stroke-width="1.6"/><path d="M9 11V8a3 3 0 016 0v3" stroke="white" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="16" r="1.2" fill="white"/></svg>
      </div>
      <div class="row-body">
        <div class="row-label">Lock Camera</div>
      </div>
      <div class="row-right">
        <span class="kb">F4</span>
        <div class="toggle-box" id="lock-box"></div>
      </div>
    </div>
    </div>

    <div class="section-label">Field of View</div>

    <div id="fov-row">
      <div id="fov-icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 6l7 6-7 6V6zM21 6l-7 6 7 6V6z" stroke="white" stroke-width="1.6" stroke-linejoin="round"/></svg>
      </div>
      <div id="fov-wrap">
        <div id="fov-track">
          <div id="fov-fill" style="width:75%"></div>
          <div id="fov-dot"  style="left:75%"></div>
        </div>
        <div id="fov-meta">
          <span id="fov-range">1° — 120°</span>
          <span id="fov-num">90°</span>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  const hud            = document.getElementById('hud');
  const aiBox          = document.getElementById('ai-box');
  const lockBox        = document.getElementById('lock-box');
  const filterLbl      = document.getElementById('filter-label');
  const fovFill        = document.getElementById('fov-fill');
  const fovDot         = document.getElementById('fov-dot');
  const fovNum         = document.getElementById('fov-num');
  const vehicleSection = document.getElementById('vehicle-section');
  const aiDriveSection = document.getElementById('ai-drive-section');

  const MIN_FOV = 1.0, MAX_FOV = 120.0;

  function setFov(v) {
    const pct = Math.min(Math.max((v - MIN_FOV) / (MAX_FOV - MIN_FOV), 0), 1);
    const p = (pct * 100).toFixed(1) + '%';
    fovFill.style.width = p;
    fovDot.style.left   = p;
    fovNum.textContent  = Math.round(v) + '\u00b0';
  }

  function flashFilter(label) {
    filterLbl.classList.add('flash');
    setTimeout(() => {
      filterLbl.textContent = label;
      filterLbl.classList.remove('flash');
    }, 100);
  }

  window.addEventListener('message', function(e) {
    const d = e.data;
    if (d.type === 'pgn_setConfig') {
      if (d.hudTop)  document.documentElement.style.setProperty('--hud-top',  d.hudTop);
      if (d.hudLeft) document.documentElement.style.setProperty('--hud-left', d.hudLeft);
    }
    if (d.type === 'pgn_setVisible') {
      hud.classList.toggle('visible', !!d.visible);
    }
    if (d.type === 'pgn_updateState') {
      if (d.fov       !== undefined) setFov(d.fov);
      if (d.filter    !== undefined) flashFilter(d.filter);
      if (d.aiDrive   !== undefined) aiBox.classList.toggle('on', d.aiDrive);
      if (d.lockedCam !== undefined) lockBox.classList.toggle('on', d.lockedCam);
      if (d.inVehicle !== undefined) vehicleSection.classList.toggle('hidden', !d.inVehicle);
      if (d.isPassenger !== undefined) aiDriveSection.classList.toggle('hidden', !!d.isPassenger);
    }
  });
</script>
</body>
</html>
